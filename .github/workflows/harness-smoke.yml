name: Harness Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build dot (unix)
        if: runner.os != 'Windows'
        run: go build -o ./bin/dot ./cmd/dot

      - name: Build dot (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: go build -o .\bin\dot.exe .\cmd\dot

      - name: Run harness (unix)
        if: runner.os != 'Windows'
        run: |
          OUT_DIR="state/e2e-runs/ci-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}"
          ./test/e2e/discover_harness.sh --dot-bin ./bin/dot --scenario discover-fast --out-dir "$OUT_DIR"
          cat "$OUT_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Run harness (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $OutDir = "state/e2e-runs/ci-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}"
          pwsh -File .\test\e2e\discover_harness_windows.ps1 -DotBin .\bin\dot.exe -Scenario discover-fast -OutDir $OutDir
          Get-Content -Path "$OutDir/summary.md" | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Upload harness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harness-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: state/e2e-runs/ci-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
